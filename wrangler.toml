name = "fmp"
main = "worker/index.ts"
compatibility_date = "2026-06-13"

# Serve the built SPA (dist/) as static assets, with SPA-style fallback so
# client-side routes (/chat, /screener, /chart) return index.html.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Non-secret vars.
[vars]
# Fallback model when the client doesn't specify one (must be in the allowlist).
PERPLEXITY_MODEL = "openai/gpt-5.5"
# Perplexity Agent API base URL (default). Override only if Perplexity changes it.
# AI_BASE_URL = "https://api.perplexity.ai/v1"

# Secrets (do NOT put real values here). Set them with:
#   wrangler secret put FMP_API_KEY
#   wrangler secret put PERPLEXITY_API_KEY   # used for the Agent API (openai/* models)
# For local dev, copy .dev.vars.example -> .dev.vars and fill in.
